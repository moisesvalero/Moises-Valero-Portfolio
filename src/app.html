<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Starter SvelteKit</title>
		<meta name="description" content="Plantilla base para lanzar interfaces modernas con SvelteKit.">
		<meta property="og:type" content="website">
		<meta name="robots" content="index, follow">
		<meta name="author" content="Starter SvelteKit">
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml">
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg">
		<meta name="theme-color" content="#7c5cbf">
		<!-- Meta SEO dinámico inyectado desde el store en +page.svelte -->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
